<!DOCTYPE html>
<html lang="zh-CN" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}JD-Relay 管理面板{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50:'#eff6ff', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8' }
                    }
                }
            }
        }
    </script>
    <style>
        /* ── Monospace for logs ── */
        .font-mono-log { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
        /* ── Smooth theme transition ── */
        *, *::before, *::after { transition: background-color 0.15s, border-color 0.15s, color 0.05s; }
        /* ── Active nav indicator ── */
        .nav-link.active { border-bottom: 2px solid #3b82f6; color: #1d4ed8; }
        html.dark .nav-link.active { border-bottom-color: #60a5fa; color: #93c5fd; }
        /* ── Status badge helpers ── */
        .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">

    <!-- ── Top Navigation ── -->
    <nav class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6">
            <div class="flex items-center justify-between h-14">
                <!-- Logo + Nav -->
                <div class="flex items-center space-x-1">
                    <a href="/" class="flex items-center mr-4 font-bold text-gray-800 dark:text-gray-100 text-base">
                        <span class="mr-2 text-xl">🔄</span> JD-Relay
                    </a>
                    <a href="/" class="nav-link px-3 py-4 text-sm text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white {% if active_page == 'dashboard' %}active{% endif %}">仪表盘</a>
                    <a href="/admin/orders" class="nav-link px-3 py-4 text-sm text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white {% if active_page == 'orders' %}active{% endif %}">工单</a>
                    <a href="/admin/agents" class="nav-link px-3 py-4 text-sm text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white {% if active_page == 'agents' %}active{% endif %}">Agent</a>
                </div>

                <!-- Right side: version + theme toggle -->
                <div class="flex items-center space-x-3">
                    <span class="text-xs text-gray-400 dark:text-gray-500">v3.0.0</span>
                    <!-- Theme Toggle -->
                    <button id="theme-toggle" class="p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 focus:outline-none" title="切换主题">
                        <svg id="icon-sun" class="w-5 h-5 hidden dark:block" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 1.22a1 1 0 011.42 1.42l-.71.71a1 1 0 01-1.42-1.42l.71-.71zM18 9a1 1 0 110 2h-1a1 1 0 110-2h1zM4.22 15.78a1 1 0 01-1.42-1.42l.71-.71a1 1 0 011.42 1.42l-.71.71zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.78 4.22a1 1 0 01-1.42 1.42l-.71-.71a1 1 0 011.42-1.42l.71.71zM2 10a1 1 0 110 2H1a1 1 0 110-2h1zm12.95 5.66a1 1 0 001.42-1.42l-.71-.71a1 1 0 00-1.42 1.42l.71.71zM10 5a5 5 0 100 10A5 5 0 0010 5z" clip-rule="evenodd"/>
                        </svg>
                        <svg id="icon-moon" class="w-5 h-5 block dark:hidden" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- ── Main Content ── -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for cat, msg in messages %}
                <div class="mb-4 p-3 rounded-lg {% if cat == 'error' %}bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-300{% else %}bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-300{% endif %}">
                    {{ msg }}
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <!-- ── Theme Script ── -->
    <script>
    (function() {
        // Persist theme preference
        const saved = localStorage.getItem('theme');
        if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    })();

    document.getElementById('theme-toggle').addEventListener('click', () => {
        const html = document.documentElement;
        const isDark = html.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // ── Shared status helpers ──
    function stateBadge(s) {
        const m = {
            DRAFT:                    'bg-gray-100 text-gray-700 dark:bg-gray-700 dark:text-gray-300',
            PENDING_APPROVAL:         'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-300',
            APPROVED:                 'bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-300',
            BUILDING:                 'bg-purple-100 text-purple-800 dark:bg-purple-900/30 dark:text-purple-300',
            SUCCESS:                  'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300',
            FAILED:                   'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300',
            CLOSED:                   'bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-400',
            PENDING_SECOND_REVIEW:    'bg-orange-100 text-orange-800 dark:bg-orange-900/30 dark:text-orange-300',
            SECOND_APPROVED:          'bg-teal-100 text-teal-800 dark:bg-teal-900/30 dark:text-teal-300',
            SECOND_REJECTED:          'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300',
            ABORTED:                  'bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-400',
        };
        return m[s] || 'bg-gray-100 text-gray-600';
    }
    function stateLabel(s) {
        const m = {
            DRAFT: '草稿', PENDING_APPROVAL: '待审批', APPROVED: '已批准',
            BUILDING: '构建中', SUCCESS: '成功', FAILED: '失败', CLOSED: '已关闭',
            PENDING_SECOND_REVIEW: '二次审核中', SECOND_APPROVED: '二审通过',
            SECOND_REJECTED: '二审拒绝', ABORTED: '已中止',
        };
        return m[s] || s;
    }
    function approvalBadge(s) {
        const m = {
            PENDING:  'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-300',
            APPROVED: 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300',
            REJECTED: 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300',
        };
        return m[s] || 'bg-gray-100 text-gray-600';
    }
    function fmtDate(iso) {
        if (!iso) return '-';
        return new Date(iso).toLocaleString('zh-CN', {
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
    }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
