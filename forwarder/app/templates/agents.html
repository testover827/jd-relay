{% extends "base.html" %}
{% set active_page = "agents" %}
{% block title %}Agent 状态 — JD-Relay{% endblock %}

{% block content %}
<div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-5">
    <div class="flex items-center justify-between mb-5">
        <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100">⚡ Agent 状态</h2>
        <button onclick="loadAgents()" class="text-xs text-blue-600 dark:text-blue-400 hover:underline">刷新</button>
    </div>

    <div id="agent-list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        <div class="text-gray-400 dark:text-gray-500 text-sm">加载中…</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadAgents() {
    try {
        const resp = await fetch('/api/admin/agents');
        const agents = await resp.json();
        const container = document.getElementById('agent-list');

        if (!agents.length) {
            container.innerHTML = '<div class="col-span-3 text-center text-gray-400 dark:text-gray-500 py-10">暂无 Agent</div>';
            return;
        }

        container.innerHTML = agents.map(a => `
            <div class="rounded-xl border p-4 ${
                a.is_online
                  ? 'border-green-200 dark:border-green-800 bg-green-50/50 dark:bg-green-900/10'
                  : 'border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-750'
            }">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center space-x-2">
                        <span class="w-3 h-3 rounded-full flex-shrink-0 ${a.is_online ? 'bg-green-500 shadow-[0_0_8px_#22c55e]' : 'bg-gray-400'}"></span>
                        <span class="font-mono text-sm font-semibold text-gray-800 dark:text-gray-200 truncate max-w-[160px]">${a.agent_id}</span>
                    </div>
                    <span class="text-xs font-medium ${a.is_online ? 'text-green-600 dark:text-green-400' : 'text-gray-400 dark:text-gray-500'}">${a.is_online ? '在线' : '离线'}</span>
                </div>

                <!-- Projects -->
                <div class="mb-3">
                    <div class="text-xs text-gray-500 dark:text-gray-400 mb-1.5">负责项目</div>
                    <div class="flex flex-wrap gap-1">
                        ${(a.projects || []).length
                          ? a.projects.map(p => `<span class="px-2 py-0.5 text-xs rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300">${p}</span>`).join('')
                          : '<span class="text-xs text-gray-400 dark:text-gray-500">无项目</span>'}
                    </div>
                </div>

                <!-- Timestamps -->
                <div class="space-y-1 text-xs text-gray-400 dark:text-gray-500">
                    ${a.connected_at ? `<div>连接时间：${fmtDate(a.connected_at)}</div>` : ''}
                    ${a.last_seen_at ? `<div>最后活跃：${fmtDate(a.last_seen_at)}</div>` : ''}
                </div>
            </div>
        `).join('');
    } catch(e) {
        console.error('加载 Agent 失败:', e);
    }
}

loadAgents();
setInterval(loadAgents, 15000);
</script>
{% endblock %}
