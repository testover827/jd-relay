# JD-Relay Forwarder 配置示例
# 复制为 forwarder.conf 并按实际环境修改
# 也可通过环境变量（RELAY_*）覆盖

[server]
host = "0.0.0.0"
port = 8000

[crypto]
ecdsa_private_key_file = "config/keys/forwarder_ecdsa_priv.pem"
ecdsa_public_key_file  = "config/keys/forwarder_ecdsa_pub.pem"

[mysql]
url = "mysql+aiomysql://jd_relay:password@localhost:3306/jd_relay"

[dingtalk]
# 钉钉应用 AppKey 和 AppSecret（在开放平台 → 应用管理中获取）
app_key    = "dingxxxxxxxxxxxxxxxx"
app_secret = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
# 应用的 AgentId（在应用详情页获取）
agent_id   = 123456789
# 审批流 processCode（在审批模板编辑页面 URL 中获取）
process_code = "PROC-XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX"
# 发起审批的钉钉 userId（工单提交人）
originator = "user001"
# 三人会签审批人 userId 列表
approvers = ["approver001", "approver002", "approver003"]

[jenkins]
url   = "http://jenkins.internal:8080"
user  = "jenkins_user"
token = "jenkins_api_token"

[admin]
# 管理面板 Basic Auth（生产环境请修改）
username = "admin"
password = "changeme_in_production"
