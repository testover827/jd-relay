# ──────────────────────────────────────────────
# Nginx 反向代理配置 — Jenkins & 钉钉转发器
# ──────────────────────────────────────────────
# 部署方式：
#   1. 将此文件复制到 /etc/nginx/sites-available/jd-relay
#   2. ln -s /etc/nginx/sites-available/jd-relay /etc/nginx/sites-enabled/
#   3. nginx -t && nginx -s reload
# ──────────────────────────────────────────────

upstream jd_relay_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP → HTTPS 重定向 ──
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN_NAME};

    # Let's Encrypt ACME 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他请求强制 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 主服务 ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${DOMAIN_NAME};

    # ── SSL 配置 ──
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN_NAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN_NAME}/privkey.pem;

    # 现代 SSL 安全策略
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (启用前确认 SSL 稳定)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── 安全头 ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── 日志 ──
    access_log /var/log/nginx/jd-relay-access.log combined buffer=16k;
    error_log  /var/log/nginx/jd-relay-error.log warn;

    # ── 请求限制 ──
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 10s;

    # 限流：每个 IP 每秒最多 20 个请求（API 端点）
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # ── API 路由 ──
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://jd_relay_backend;
        proxy_http_version 1.1;

        # Header 转发
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # WebSocket / SSE 支持（日志实时流）
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # 超时
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;  # SSE 长连接
    }

    # ── Web 面板路由 ──
    location / {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://jd_relay_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── 登录接口特殊限流 ──
    location /login {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass http://jd_relay_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 静态文件（直接由 Nginx 提供） ──
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── 健康检查（不限流） ──
    location /health {
        proxy_pass http://jd_relay_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
