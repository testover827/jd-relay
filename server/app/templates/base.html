<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Jenkins & 钉钉 转发器{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .log-entry { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
        .status-pending { @apply bg-yellow-100 text-yellow-800; }
        .status-approved { @apply bg-green-100 text-green-800; }
        .status-rejected { @apply bg-red-100 text-red-800; }
        .status-building { @apply bg-blue-100 text-blue-800; }
        .status-success { @apply bg-green-100 text-green-800; }
        .status-failure { @apply bg-red-100 text-red-800; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-14">
                <div class="flex space-x-6">
                    <a href="/" class="flex items-center font-bold text-gray-800 text-lg">
                        🔄 Jenkins & 钉钉 转发器
                    </a>
                    <a href="/" class="flex items-center px-3 text-sm text-gray-600 hover:text-gray-900 {% if request.url.path == '/' %}border-b-2 border-blue-500{% endif %}">仪表盘</a>
                    <a href="/approvals" class="flex items-center px-3 text-sm text-gray-600 hover:text-gray-900 {% if '/approvals' in request.url.path %}border-b-2 border-blue-500{% endif %}">审批记录</a>
                    <a href="/builds" class="flex items-center px-3 text-sm text-gray-600 hover:text-gray-900 {% if '/builds' in request.url.path %}border-b-2 border-blue-500{% endif %}">构建记录</a>
                    <a href="/logs" class="flex items-center px-3 text-sm text-gray-600 hover:text-gray-900 {% if '/logs' in request.url.path %}border-b-2 border-blue-500{% endif %}">实时日志</a>
                    <a href="/config" class="flex items-center px-3 text-sm text-gray-600 hover:text-gray-900 {% if '/config' in request.url.path %}border-b-2 border-blue-500{% endif %}">配置</a>
                </div>
                <div class="flex items-center text-xs text-gray-400">
                    v0.1.0
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
