{% extends "base.html" %}
{% block title %}实时日志 - 转发器{% endblock %}
{% block content %}

<div class="bg-white rounded-lg shadow p-4">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">📡 实时日志流</h2>
        <div class="flex space-x-2">
            <select id="source-filter" onchange="loadLogs(1)" class="px-3 py-1 border rounded text-sm">
                <option value="">全部来源</option>
                <option value="dingtalk">钉钉</option>
                <option value="jenkins">Jenkins</option>
                <option value="relay">转发器</option>
                <option value="system">系统</option>
            </select>
            <button onclick="toggleLive()" id="live-btn" class="px-3 py-1 bg-green-600 text-white rounded text-sm hover:bg-green-700">
                ● 实时
            </button>
        </div>
    </div>

    <!-- SSE 实时日志 -->
    <div id="log-container" class="bg-gray-900 text-gray-100 rounded p-3 h-96 overflow-y-auto log-entry mb-4">
        <div class="text-gray-500">连接 SSE 流中...</div>
    </div>

    <!-- 历史日志表 -->
    <div class="overflow-x-auto">
        <table class="w-full text-sm">
            <thead>
                <tr class="border-b text-left text-gray-500">
                    <th class="py-2 w-24">时间</th>
                    <th class="py-2 w-16">级别</th>
                    <th class="py-2 w-16">来源</th>
                    <th class="py-2">操作</th>
                    <th class="py-2">详情</th>
                </tr>
            </thead>
            <tbody id="logs-table">
                <tr><td colspan="5" class="py-4 text-center text-gray-400">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="pagination" class="flex justify-center space-x-2 mt-4"></div>
</div>

<script>
let liveMode = true;
let eventSource = null;

function connectSSE() {
    if (eventSource) eventSource.close();
    const container = document.getElementById('log-container');
    eventSource = new EventSource('/api/v1/admin/logs/stream');

    eventSource.addEventListener('log', (event) => {
        if (!liveMode) return;
        const data = JSON.parse(event.data);
        const line = document.createElement('div');
        line.className = 'py-0.5 border-b border-gray-800';
        const time = new Date(data.timestamp).toLocaleTimeString();
        const badge = data.level === 'ERROR'
            ? '<span style="color:#f87171">ERROR</span>'
            : data.level === 'WARN'
            ? '<span style="color:#fbbf24">WARN </span>'
            : '<span style="color:#60a5fa">INFO </span>';
        const lock = data.is_encrypted ? '🔒' : '';
        line.innerHTML = `<span style="color:#9ca3af">${time}</span> ${badge} <span style="color:#a78bfa">[${data.source}]</span> ${lock} ${data.detail || data.action}`;
        container.appendChild(line);
        container.scrollTop = container.scrollHeight;
        // 保留最近 200 条
        while (container.children.length > 200) {
            container.removeChild(container.children[0]);
        }
    });

    eventSource.onerror = () => {
        if (liveMode) setTimeout(connectSSE, 3000);
    };
}

function toggleLive() {
    liveMode = !liveMode;
    const btn = document.getElementById('live-btn');
    if (liveMode) {
        btn.textContent = '● 实时';
        btn.className = 'px-3 py-1 bg-green-600 text-white rounded text-sm hover:bg-green-700';
        connectSSE();
    } else {
        btn.textContent = '○ 暂停';
        btn.className = 'px-3 py-1 bg-gray-400 text-white rounded text-sm hover:bg-gray-500';
        if (eventSource) eventSource.close();
    }
}

async function loadLogs(page) {
    const source = document.getElementById('source-filter').value;
    const resp = await fetch(`/api/v1/admin/logs?page=${page}&page_size=50&source=${source}`);
    const data = await resp.json();

    const tbody = document.getElementById('logs-table');
    tbody.innerHTML = data.items.map(l => `
        <tr class="border-b hover:bg-gray-50">
            <td class="py-1 text-gray-500 text-xs">${new Date(l.timestamp).toLocaleTimeString()}</td>
            <td class="py-1"><span class="px-1 rounded text-xs ${levelClass(l.level)}">${l.level}</span></td>
            <td class="py-1"><span class="px-1 rounded text-xs bg-purple-100 text-purple-800">${l.source}</span></td>
            <td class="py-1">${l.action}</td>
            <td class="py-1 text-gray-500 text-xs">${l.detail || ''} ${l.is_encrypted ? '🔒' : ''}</td>
        </tr>
    `).join('') || '<tr><td colspan="5" class="py-4 text-center text-gray-400">暂无数据</td></tr>';

    renderPagination(data.total, data.page, data.page_size, 'loadLogs');
}

function levelClass(l) {
    const m = {ERROR: 'bg-red-100 text-red-800', WARN: 'bg-yellow-100 text-yellow-800'};
    return m[l] || 'bg-blue-100 text-blue-800';
}

function renderPagination(total, page, pageSize, fnName) {
    const pages = Math.ceil(total / pageSize);
    const div = document.getElementById('pagination');
    let html = '';
    for (let i = 1; i <= pages; i++) {
        html += `<button onclick="${fnName}(${i})" class="px-3 py-1 rounded ${i === page ? 'bg-blue-600 text-white' : 'bg-gray-200 hover:bg-gray-300'}">${i}</button>`;
    }
    div.innerHTML = html || '<span class="text-gray-400">共 0 条</span>';
}

connectSSE();
loadLogs(1);
</script>
{% endblock %}
