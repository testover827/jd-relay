{% extends "base.html" %}
{% block title %}审批记录 - 转发器{% endblock %}
{% block content %}

<div class="bg-white rounded-lg shadow p-4">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">📋 审批记录</h2>
        <div class="flex space-x-2">
            <select id="status-filter" onchange="loadApprovals(1)" class="px-3 py-1 border rounded text-sm">
                <option value="">全部状态</option>
                <option value="pending">待审批</option>
                <option value="approved">已通过</option>
                <option value="rejected">已拒绝</option>
                <option value="cancelled">已取消</option>
            </select>
        </div>
    </div>

    <div class="overflow-x-auto">
        <table class="w-full text-sm">
            <thead>
                <tr class="border-b text-left text-gray-500">
                    <th class="py-2">标题</th>
                    <th class="py-2">类型</th>
                    <th class="py-2">Jenkins Job</th>
                    <th class="py-2">状态</th>
                    <th class="py-2">时间</th>
                </tr>
            </thead>
            <tbody id="approvals-table">
                <tr><td colspan="5" class="py-4 text-center text-gray-400">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="pagination" class="flex justify-center space-x-2 mt-4"></div>
</div>

<script>
async function loadApprovals(page) {
    const status = document.getElementById('status-filter').value;
    const resp = await fetch(`/api/v1/admin/approvals?page=${page}&page_size=20&status=${status}`);
    const data = await resp.json();

    const tbody = document.getElementById('approvals-table');
    tbody.innerHTML = data.items.map(a => `
        <tr class="border-b hover:bg-gray-50">
            <td class="py-2 font-medium">${a.title}</td>
            <td class="py-2">${a.type === 'dingtalk_to_jenkins' ? '钉钉→Jenkins' : 'Jenkins→钉钉'}</td>
            <td class="py-2">${a.jenkins_job_name || '-'}</td>
            <td class="py-2"><span class="px-2 py-0.5 rounded text-xs ${statusClass(a.status)}">${statusLabel(a.status)}</span></td>
            <td class="py-2 text-gray-500">${new Date(a.created_at).toLocaleString()}</td>
        </tr>
    `).join('') || '<tr><td colspan="5" class="py-4 text-center text-gray-400">暂无数据</td></tr>';

    renderPagination(data.total, data.page, data.page_size, 'loadApprovals');
}

function statusClass(s) {
    const m = {pending: 'bg-yellow-100 text-yellow-800', approved: 'bg-green-100 text-green-800',
               rejected: 'bg-red-100 text-red-800', cancelled: 'bg-gray-100 text-gray-800'};
    return m[s] || 'bg-gray-100';
}
function statusLabel(s) {
    const m = {pending: '⏳ 待审批', approved: '✅ 已通过', rejected: '❌ 已拒绝', cancelled: '↩️ 已取消'};
    return m[s] || s;
}

function renderPagination(total, page, pageSize, fnName) {
    const pages = Math.ceil(total / pageSize);
    const div = document.getElementById('pagination');
    let html = '';
    for (let i = 1; i <= pages; i++) {
        html += `<button onclick="${fnName}(${i})" class="px-3 py-1 rounded ${i === page ? 'bg-blue-600 text-white' : 'bg-gray-200 hover:bg-gray-300'}">${i}</button>`;
    }
    div.innerHTML = html || '<span class="text-gray-400">共 0 条</span>';
}

loadApprovals(1);
</script>
{% endblock %}
