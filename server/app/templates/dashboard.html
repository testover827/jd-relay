{% extends "base.html" %}
{% block title %}仪表盘 - 转发器{% endblock %}
{% block content %}

<div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
    <div class="bg-white rounded-lg shadow p-4">
        <div class="text-sm text-gray-500">总审批</div>
        <div class="text-2xl font-bold" id="stat-total-approvals">-</div>
    </div>
    <div class="bg-white rounded-lg shadow p-4">
        <div class="text-sm text-gray-500">待审批</div>
        <div class="text-2xl font-bold text-yellow-600" id="stat-pending-approvals">-</div>
    </div>
    <div class="bg-white rounded-lg shadow p-4">
        <div class="text-sm text-gray-500">总构建</div>
        <div class="text-2xl font-bold" id="stat-total-builds">-</div>
    </div>
    <div class="bg-white rounded-lg shadow p-4">
        <div class="text-sm text-gray-500">运行中</div>
        <div class="text-2xl font-bold text-blue-600" id="stat-running-builds">-</div>
    </div>
    <div class="bg-white rounded-lg shadow p-4">
        <div class="text-sm text-gray-500">成功率</div>
        <div class="text-2xl font-bold text-green-600" id="stat-success-rate">-</div>
    </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
    <!-- 实时日志流 -->
    <div class="bg-white rounded-lg shadow p-4">
        <h3 class="font-semibold mb-3">📡 实时日志流</h3>
        <div id="log-stream" class="bg-gray-900 text-gray-100 rounded p-3 h-64 overflow-y-auto log-entry">
            <div class="text-gray-500">等待连接...</div>
        </div>
    </div>

    <!-- 最近审批 -->
    <div class="bg-white rounded-lg shadow p-4">
        <h3 class="font-semibold mb-3">📋 最近审批</h3>
        <div id="recent-approvals" class="space-y-2">
            <div class="text-gray-400 text-sm">加载中...</div>
        </div>
    </div>
</div>

<div class="bg-white rounded-lg shadow p-4">
    <h3 class="font-semibold mb-3">🔨 最近构建</h3>
    <div id="recent-builds" class="space-y-2">
        <div class="text-gray-400 text-sm">加载中...</div>
    </div>
</div>

<script>
// ── SSE 日志流 ──
function connectLogStream() {
    const container = document.getElementById('log-stream');
    const es = new EventSource('/api/v1/admin/logs/stream');
    es.addEventListener('log', (event) => {
        const data = JSON.parse(event.data);
        const line = document.createElement('div');
        line.className = 'py-0.5 border-b border-gray-800';
        const time = new Date(data.timestamp).toLocaleTimeString();
        const badge = data.level === 'ERROR'
            ? '<span style="color:#f87171">ERROR</span>'
            : data.level === 'WARN'
            ? '<span style="color:#fbbf24">WARN </span>'
            : '<span style="color:#60a5fa">INFO </span>';
        const lock = data.is_encrypted ? '🔒' : '';
        line.innerHTML = `<span style="color:#9ca3af">${time}</span> ${badge} <span style="color:#a78bfa">[${data.source}]</span> ${lock} ${data.detail || data.action}`;
        container.appendChild(line);
        if (container.children.length > 1) {
            container.removeChild(container.children[0]);
        }
        container.scrollTop = container.scrollHeight;
    });
    es.onerror = () => { setTimeout(connectLogStream, 3000); };
}

// ── 仪表盘数据 ──
async function refreshDashboard() {
    try {
        const resp = await fetch('/api/v1/admin/dashboard');
        const data = await resp.json();

        document.getElementById('stat-total-approvals').textContent = data.stats.total_approvals;
        document.getElementById('stat-pending-approvals').textContent = data.stats.pending_approvals;
        document.getElementById('stat-total-builds').textContent = data.stats.total_builds;
        document.getElementById('stat-running-builds').textContent = data.stats.running_builds;
        document.getElementById('stat-success-rate').textContent = data.stats.success_rate_pct + '%';

        // 最近审批
        const apprDiv = document.getElementById('recent-approvals');
        apprDiv.innerHTML = data.recent_approvals.map(a => `
            <div class="flex justify-between items-center p-2 rounded bg-gray-50">
                <div>
                    <span class="text-sm font-medium">${a.title}</span>
                    <span class="text-xs text-gray-500 ml-2">${a.jenkins_job_name || ''}</span>
                </div>
                <span class="px-2 py-0.5 rounded text-xs ${statusClass(a.status)}">${statusLabel(a.status)}</span>
            </div>
        `).join('') || '<div class="text-gray-400 text-sm">暂无数据</div>';

        // 最近构建
        const buildDiv = document.getElementById('recent-builds');
        buildDiv.innerHTML = data.recent_builds.map(b => `
            <div class="flex justify-between items-center p-2 rounded bg-gray-50">
                <div>
                    <span class="text-sm font-medium">${b.job_name}</span>
                    <span class="text-xs text-gray-500 ml-2">#${b.jenkins_build_id || b.id}</span>
                </div>
                <span class="px-2 py-0.5 rounded text-xs ${buildStatusClass(b.result || b.status)}">${b.result || b.status}</span>
            </div>
        `).join('') || '<div class="text-gray-400 text-sm">暂无数据</div>';
    } catch(e) {
        console.error('刷新仪表盘失败:', e);
    }
}

function statusClass(s) {
    const m = {pending: 'bg-yellow-100 text-yellow-800', approved: 'bg-green-100 text-green-800',
               rejected: 'bg-red-100 text-red-800', cancelled: 'bg-gray-100 text-gray-800'};
    return m[s] || 'bg-gray-100';
}
function statusLabel(s) {
    const m = {pending: '⏳ 待审批', approved: '✅ 已通过', rejected: '❌ 已拒绝', cancelled: '↩️ 已取消'};
    return m[s] || s;
}
function buildStatusClass(s) {
    const m = {success: 'bg-green-100 text-green-800', failure: 'bg-red-100 text-red-800',
               aborted: 'bg-gray-100 text-gray-800', building: 'bg-blue-100 text-blue-800',
               queued: 'bg-yellow-100 text-yellow-800', pending: 'bg-yellow-100 text-yellow-800'};
    return m[(s||'').toLowerCase()] || 'bg-gray-100';
}

connectLogStream();
refreshDashboard();
setInterval(refreshDashboard, 30000);
</script>
{% endblock %}
