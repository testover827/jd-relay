[pytest]
# pytest 配置 — Jenkins & 钉钉转发器项目

# 测试发现路径
testpaths = tests

# 文件/函数匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 异步测试配置
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 输出格式
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# 标记定义
markers =
    unit: 单元测试（纯逻辑，无外部依赖）
    integration: 集成测试（API 端点 + mock 服务）
    e2e: 端到端测试（完整业务流程）
    slow: 耗时较长的测试
    security: 安全相关测试

# 日志配置（失败时输出）
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

#覆盖率配置（使用 pytest-cov）
# addopts = --cov=app --cov-report=term-missing --cov-fail-under=80

# 最小 pytest 版本要求
minversion = 7.0
